.summary-row{display:flex;justify-content:space-between;margin-top:8px;gap:12px;font-size:14px}.summary-row span:last-child{text-align:right;word-break:break-word;max-width:58%}
@media (max-width:600px){body{padding-bottom:120px}input,select,textarea,.btn{font-size:16px}}
</style>
</head>
<body>
<header>

<p class="sub">&#x0E15;&#x0E23;&#x0E27;&#x0E08;&#x0E2A;&#x0E2D;&#x0E1A;&#x0E02;&#x0E49;&#x0E2D;&#x0E21;&#x0E39;&#x0E25;&#x0E01;&#x0E48;&#x0E2D;&#x0E19;&#x0E22;&#x0E37;&#x0E19;&#x0E22;&#x0E31;&#x0E19;</p>

<div class="summary-row"><span>&#x0E17;&#x0E35;&#x0E48;&#x0E2D;&#x0E22;&#x0E39;&#x0E48;&#x0E1C;&#x0E39;&#x0E49;&#x0E2A;&#x0E48;&#x0E07;</span><span id="sumSenderAddress">...</span></div>
<div class="summary-row"><span>&#x0E17;&#x0E35;&#x0E48;&#x0E2D;&#x0E22;&#x0E39;&#x0E48;&#x0E1C;&#x0E39;&#x0E49;&#x0E23;&#x0E31;&#x0E1A;</span><span id="sumReceiverAddress">...</span></div>
<div class="summary-row"><span>&#x0E1B;&#x0E23;&#x0E30;&#x0E40;&#x0E20;&#x0E17;&#x0E1E;&#x0E31;&#x0E2A;&#x0E14;&#x0E38;</span><span id="sumParcelType">...</span></div>
<div class="summary-row"><span>&#x0E19;&#x0E49;&#x0E33;&#x0E2B;&#x0E19;&#x0E31;&#x0E01;</span><span id="sumParcelWeight">...</span></div>
<div class="summary-row"><span>&#x0E23;&#x0E30;&#x0E22;&#x0E30;&#x0E17;&#x0E32;&#x0E07;&#x0E1B;&#x0E23;&#x0E30;&#x0E21;&#x0E32;&#x0E13;</span><span id="sumDistance">...</span></div>
<div class="summary-row"><span>&#x0E2B;&#x0E21;&#x0E32;&#x0E22;&#x0E40;&#x0E2B;&#x0E15;&#x0E38;&#x0E08;&#x0E38;&#x0E14;&#x0E23;&#x0E31;&#x0E1A;</span><span id="sumPickupNote">-</span></div>
<div class="summary-row"><span>&#x0E2B;&#x0E21;&#x0E32;&#x0E22;&#x0E40;&#x0E2B;&#x0E15;&#x0E38;&#x0E08;&#x0E38;&#x0E14;&#x0E2A;&#x0E48;&#x0E07;</span><span id="sumDropoffNote">-</span></div>
</div>

<div class="card">
<div class="section-title">&#x0E01;&#x0E32;&#x0E23;&#x0E0A;&#x0E33;&#x0E23;&#x0E30;&#x0E40;&#x0E07;&#x0E34;&#x0E19;</div>
<label>&#x0E40;&#x0E25;&#x0E37;&#x0E2D;&#x0E01;&#x0E27;&#x0E34;&#x0E18;&#x0E35;&#x0E01;&#x0E32;&#x0E23;&#x0E0A;&#x0E33;&#x0E23;&#x0E30;&#x0E40;&#x0E07;&#x0E34;&#x0E19;</label>
<select id="paymentMethod">
<option value="cash">&#x0E40;&#x0E07;&#x0E34;&#x0E19;&#x0E2A;&#x0E14;</option>
<option value="transfer">&#x0E42;&#x0E2D;&#x0E19;</option>
</select>
<label>&#x0E1C;&#x0E39;&#x0E49;&#x0E0A;&#x0E33;&#x0E23;&#x0E30;&#x0E40;&#x0E07;&#x0E34;&#x0E19;</label>
<select id="payer">
<option value="sender">&#x0E1C;&#x0E39;&#x0E49;&#x0E2A;&#x0E48;&#x0E07;</option>
<option value="receiver">&#x0E1C;&#x0E39;&#x0E49;&#x0E23;&#x0E31;&#x0E1A; (&#x0E40;&#x0E07;&#x0E34;&#x0E19;&#x0E2A;&#x0E14;&#x0E40;&#x0E17;&#x0E48;&#x0E32;&#x0E19;&#x0E31;&#x0E49;&#x0E19;)</option>
</select>
<label>&#x0E23;&#x0E2B;&#x0E31;&#x0E2A;&#x0E42;&#x0E1B;&#x0E23;&#x0E42;&#x0E21;&#x0E0A;&#x0E31;&#x0E19;</label>
<input id="promoCode" placeholder="&#x0E16;&#x0E49;&#x0E32;&#x0E21;&#x0E35;">

<div class="card">
<div class="section-title">&#x0E2A;&#x0E23;&#x0E38;&#x0E1B;&#x0E23;&#x0E32;&#x0E04;&#x0E32;</div>
<div class="summary-row"><span>&#x0E04;&#x0E48;&#x0E32;&#x0E08;&#x0E31;&#x0E14;&#x0E2A;&#x0E48;&#x0E07;</span><span id="sumPrice">&#x0E04;&#x0E33;&#x0E19;&#x0E27;&#x0E13;&#x0E08;&#x0E32;&#x0E01;&#x0E23;&#x0E30;&#x0E1A;&#x0E1A;</span></div>

  <button id="backBtn" class="btn secondary" type="button">&#x0E22;&#x0E49;&#x0E2D;&#x0E19;&#x0E01;&#x0E25;&#x0E31;&#x0E1A;</button>
  <button id="confirmBtn" class="btn" type="button">&#x0E22;&#x0E37;&#x0E19;&#x0E22;&#x0E31;&#x0E19;&#x0E01;&#x0E32;&#x0E23;&#x0E2A;&#x0E31;&#x0E48;&#x0E07;&#x0E2A;&#x0E48;&#x0E07;</button>
</div>
</div>

<script>
const TH = {
  km: '\u0E01\u0E21.',
  baht: '\u0E1A\u0E32\u0E17',
  calcFromSystem: '\u0E04\u0E33\u0E19\u0E27\u0E13\u0E08\u0E32\u0E01\u0E23\u0E30\u0E1A\u0E1A',
  cashOnlyReceiver: '\u0E1C\u0E39\u0E49\u0E23\u0E31\u0E1A\u0E0A\u0E33\u0E23\u0E30\u0E44\u0E14\u0E49\u0E40\u0E09\u0E1E\u0E32\u0E30\u0E40\u0E07\u0E34\u0E19\u0E2A\u0E14\u0E40\u0E17\u0E48\u0E32\u0E19\u0E31\u0E49\u0E19',
  success: '\u0E1A\u0E31\u0E19\u0E17\u0E36\u0E01\u0E04\u0E33\u0E2A\u0E31\u0E48\u0E07\u0E2A\u0E48\u0E07\u0E2A\u0E33\u0E40\u0E23\u0E47\u0E08'
};

const sumSenderAddress = document.getElementById('sumSenderAddress');
const sumReceiverAddress = document.getElementById('sumReceiverAddress');
const sumParcelType = document.getElementById('sumParcelType');
const sumParcelWeight = document.getElementById('sumParcelWeight');
const sumDistance = document.getElementById('sumDistance');
const sumPrice = document.getElementById('sumPrice');
const sumPickupNote = document.getElementById('sumPickupNote');
const sumDropoffNote = document.getElementById('sumDropoffNote');
const backBtn = document.getElementById('backBtn');
const confirmBtn = document.getElementById('confirmBtn');
const paymentMethodField = document.getElementById('paymentMethod');
const payerField = document.getElementById('payer');
const promoCodeField = document.getElementById('promoCode');

function escapeHtml(value){
  return String(value || '...')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

let step1 = {};
let step2 = {};
let step3 = {};

function loadSteps(){
  try{ step1 = JSON.parse(localStorage.getItem('parcel_step1') || '{}'); }catch(e){ step1 = {}; }
  try{ step2 = JSON.parse(localStorage.getItem('parcel_step2') || '{}'); }catch(e){ step2 = {}; }
  try{ step3 = JSON.parse(localStorage.getItem('parcel_step3') || '{}'); }catch(e){ step3 = {}; }

  const hasStep1 = !!((step1.pickupAddress || '').trim() && (step1.dropoffAddress || '').trim());
  const hasStep2 = !!((step2.senderName || '').trim() && (step2.senderPhone || '').trim() && (step2.receiverName || '').trim() && (step2.receiverPhone || '').trim());

  if(!hasStep1){
    window.location.href = 'index.html';
    return false;
  }
  if(!hasStep2){
    window.location.href = 'pacel2.html';
    return false;
  }

  return true;
}

function loadSummary(){
  if(!loadSteps()){
    return;
  }

  sumSenderAddress.innerHTML = escapeHtml(step1.pickupAddress || step2.senderAddress);
  sumReceiverAddress.innerHTML = escapeHtml(step1.dropoffAddress || step2.receiverAddress);
  sumParcelType.innerHTML = escapeHtml(step2.parcelType);
  sumParcelWeight.innerHTML = escapeHtml(step2.parcelWeight);
  sumPickupNote.innerHTML = escapeHtml(step1.pickupNote || '-');
  sumDropoffNote.innerHTML = escapeHtml(step1.dropoffNote || '-');
  sumDistance.innerHTML = step1.distanceKm ? `${Number(step1.distanceKm).toFixed(1)} ${TH.km}` : '...';
  sumPrice.innerHTML = step1.priceEstimate ? `${Number(step1.priceEstimate).toLocaleString('th-TH')} ${TH.baht}` : TH.calcFromSystem;

  if(step3.payment_method) paymentMethodField.value = step3.payment_method;
  if(step3.payer) payerField.value = step3.payer;
  if(step3.promo_code) promoCodeField.value = step3.promo_code;
}

backBtn.addEventListener('click', () => {
  window.location.href = 'pacel2.html';
});

confirmBtn.addEventListener('click', () => {
  if(!loadSteps()){
    return;
  }

  const payment_method = paymentMethodField.value;
  const payer = payerField.value;
  const promo_code = promoCodeField.value.trim();

  if(payment_method === 'transfer' && payer === 'receiver'){
    alert(TH.cashOnlyReceiver);
    return;
  }

  localStorage.setItem('parcel_step3', JSON.stringify({ payment_method, payer, promo_code }));

  localStorage.setItem('parcel_last_submission', JSON.stringify({
    service_type: 'parcel',
    pickup_address: step1.pickupAddress || step2.senderAddress || '',
    dropoff_address: step1.dropoffAddress || step2.receiverAddress || '',
    distance_km: step1.distanceKm || 0,
    delivery_fee: step1.priceEstimate || 0,
    pickup_note: step1.pickupNote || '',
    dropoff_note: step1.dropoffNote || '',
    sender_name: step2.senderName || '',
    sender_phone: step2.senderPhone || '',
    sender_note: step2.senderNote || '',
    receiver_name: step2.receiverName || '',
    receiver_phone: step2.receiverPhone || '',
    receiver_note: step2.receiverNote || '',
    parcel_type: step2.parcelType || '',
    parcel_weight: step2.parcelWeight || '',
    payment_method,
    payer,
    promo_code,
    submitted_at: new Date().toISOString(),
    created_from: 'parcel-prototype'
  }));

  alert(TH.success);
  localStorage.removeItem('parcel_step1');
  localStorage.removeItem('parcel_step2');
  localStorage.removeItem('parcel_step3');
  window.location.href = 'index.html';
});

loadSummary();
</script>
</body>
</html>
