<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ส่งพัสดุ - ข้อมูลผู้ส่งและผู้รับ</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--primary:#0b3c6d;--secondary:#1e88e5;--bg:#f4f7fb;--card:#ffffff}
*{box-sizing:border-box}
body{margin:0;font-family:'Prompt',sans-serif;background:var(--bg);color:#111;padding-bottom:100px}
header{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;padding:22px 16px 28px;border-bottom-left-radius:22px;border-bottom-right-radius:22px}
h1{margin:0;font-size:18px}p.sub{margin:4px 0 0;font-size:13px;opacity:.9}
.card{background:var(--card);margin:16px;padding:16px;border-radius:18px;box-shadow:0 6px 18px rgba(0,0,0,.06)}
label{font-size:13px;color:#374151;margin-top:12px;display:block}
input,select,textarea{width:100%;padding:12px;margin-top:6px;border-radius:12px;border:1px solid #d1d5db;font-family:'Prompt',sans-serif}
.section-title{font-weight:600;margin-bottom:6px}.footer{position:fixed;bottom:0;left:0;right:0;padding:14px 16px;background:#fff;border-top:1px solid #e5e7eb}.btn-row{display:flex;gap:10px}
.btn{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;padding:14px;border-radius:14px;text-align:center;font-weight:500;border:none;width:100%;cursor:pointer;font-size:15px;font-family:'Prompt',sans-serif}.btn.secondary{background:#eef2f7;color:#0b3c6d}.btn:disabled{opacity:.6;cursor:not-allowed}
</style>
</head>
<body>
<header>
<h1>รายละเอียดการจัดส่ง</h1>
<p class="sub">กรอกข้อมูลผู้ส่ง ผู้รับ และพัสดุ</p>
</header>

<div class="card">
<div class="section-title">ผู้ส่ง</div>
<label>ที่อยู่</label>
<input id="senderAddress" placeholder="แสดงที่อยู่จากแผนที่">
<label>ชื่อ</label>
<input id="senderName" placeholder="ชื่อผู้ส่ง">
<label>เบอร์โทร</label>
<input id="senderPhone" inputmode="numeric" placeholder="เบอร์โทรศัพท์">
<label>หมายเหตุถึงไรเดอร์</label>
<textarea id="senderNote" placeholder="ถ้ามี"></textarea>
</div>

<div class="card">
<div class="section-title">ผู้รับ</div>
<label>ที่อยู่</label>
<input id="receiverAddress" placeholder="แสดงที่อยู่จากแผนที่">
<label>ชื่อ</label>
<input id="receiverName" placeholder="ชื่อผู้รับ">
<label>เบอร์โทร</label>
<input id="receiverPhone" inputmode="numeric" placeholder="เบอร์โทรศัพท์">
<label>หมายเหตุถึงไรเดอร์</label>
<textarea id="receiverNote" placeholder="ถ้ามี"></textarea>
<label>ประเภทพัสดุ</label>
<select id="parcelType">
<option>สินค้าแฟชั่น</option>
<option>อาหารและเครื่องดื่ม</option>
<option>เครื่องใช้ไฟฟ้า</option>
<option>เอกสาร</option>
<option>ยา</option>
<option>อื่น ๆ</option>
</select>
</div>

<div class="card">
<div class="section-title">น้ำหนักทั้งหมด</div>
<select id="parcelWeight">
<option>น้อยกว่า 1 กก.</option>
<option>1 - 5 กก.</option>
<option>6 - 10 กก.</option>
<option>11 - 15 กก.</option>
</select>
</div>

<div class="footer">
<div class="btn-row">
  <button id="backBtn" class="btn secondary" type="button">ย้อนกลับ</button>
  <button id="nextBtn" class="btn" type="button">ถัดไป</button>
</div>
</div>

<script>
const fields = {
  senderAddress: document.getElementById('senderAddress'),
  senderName: document.getElementById('senderName'),
  senderPhone: document.getElementById('senderPhone'),
  senderNote: document.getElementById('senderNote'),
  receiverAddress: document.getElementById('receiverAddress'),
  receiverName: document.getElementById('receiverName'),
  receiverPhone: document.getElementById('receiverPhone'),
  receiverNote: document.getElementById('receiverNote'),
  parcelType: document.getElementById('parcelType'),
  parcelWeight: document.getElementById('parcelWeight')
};
const backBtn = document.getElementById('backBtn');
const nextBtn = document.getElementById('nextBtn');

function normalizePhone(value){
  return value.replace(/\D/g, '');
}

function sanitizeAddress(value){
  const cleaned = (value || '')
    .replace(/^[A-Z0-9+]{4,}\s*/i, '')
    .replace(/\s*ประเทศไทย$/, '')
    .replace(/\s+/g, ' ')
    .trim();
  return cleaned;
}

function isValid(){
  return fields.senderAddress.value.trim()
    && fields.senderName.value.trim()
    && fields.senderPhone.value.trim()
    && fields.receiverAddress.value.trim()
    && fields.receiverName.value.trim()
    && fields.receiverPhone.value.trim();
}

function syncButton(){
  nextBtn.disabled = !isValid();
}

Object.values(fields).forEach(el => {
  el.addEventListener('input', syncButton);
  el.addEventListener('change', syncButton);
});

backBtn.addEventListener('click', () => {
  window.location.href = 'index.html';
});

nextBtn.addEventListener('click', () => {
  const senderPhone = normalizePhone(fields.senderPhone.value.trim());
  const receiverPhone = normalizePhone(fields.receiverPhone.value.trim());

  if(!isValid()){
    syncButton();
    return;
  }

  if(senderPhone.length < 9 || senderPhone.length > 10 || receiverPhone.length < 9 || receiverPhone.length > 10){
    alert('กรุณากรอกเบอร์โทรให้ถูกต้อง');
    return;
  }

  const payload = {
    senderAddress: sanitizeAddress(fields.senderAddress.value.trim()),
    senderName: fields.senderName.value.trim(),
    senderPhone,
    senderNote: fields.senderNote.value.trim(),
    receiverAddress: sanitizeAddress(fields.receiverAddress.value.trim()),
    receiverName: fields.receiverName.value.trim(),
    receiverPhone,
    receiverNote: fields.receiverNote.value.trim(),
    parcelType: fields.parcelType.value,
    parcelWeight: fields.parcelWeight.value
  };
  localStorage.setItem('parcel_step2', JSON.stringify(payload));
  window.location.href = 'pacel3.html';
});

try{
  const step1 = JSON.parse(localStorage.getItem('parcel_step1') || '{}');
  const saved = JSON.parse(localStorage.getItem('parcel_step2') || '{}');
  Object.keys(fields).forEach(key => {
    if(saved[key] !== undefined && saved[key] !== null){
      fields[key].value = key === 'senderAddress' || key === 'receiverAddress' ? sanitizeAddress(saved[key]) : saved[key];
    }
  });
  if(!fields.senderAddress.value && step1.pickupAddress){
    fields.senderAddress.value = sanitizeAddress(step1.pickupAddress);
  }
  if(!fields.receiverAddress.value && step1.dropoffAddress){
    fields.receiverAddress.value = sanitizeAddress(step1.dropoffAddress);
  }
}catch(e){}
syncButton();
</script>
</body>
</html>
