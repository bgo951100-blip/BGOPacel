<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ส่งพัสดุ - สรุปและชำระเงิน</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--primary:#0b3c6d;--secondary:#1e88e5;--bg:#f4f7fb;--card:#ffffff}
*{box-sizing:border-box}
body{margin:0;font-family:'Prompt',sans-serif;background:var(--bg);color:#111;padding-bottom:100px}
header{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;padding:22px 16px 28px;border-bottom-left-radius:22px;border-bottom-right-radius:22px}
h1{margin:0;font-size:18px}p.sub{margin:4px 0 0;font-size:13px;opacity:.9}
.card{background:var(--card);margin:16px;padding:16px;border-radius:18px;box-shadow:0 6px 18px rgba(0,0,0,.06)}
label{font-size:13px;color:#374151;margin-top:12px;display:block}
input,select,textarea{width:100%;padding:12px;margin-top:6px;border-radius:12px;border:1px solid #d1d5db;font-family:'Prompt',sans-serif}
.section-title{font-weight:600;margin-bottom:6px}.footer{position:fixed;bottom:0;left:0;right:0;padding:14px 16px;background:#fff;border-top:1px solid #e5e7eb}.btn-row{display:flex;gap:10px}
.btn{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;padding:14px;border-radius:14px;text-align:center;font-weight:500;border:none;width:100%;cursor:pointer;font-size:15px;font-family:'Prompt',sans-serif}.btn.secondary{background:#eef2f7;color:#0b3c6d}
.summary-row{display:flex;justify-content:space-between;margin-top:8px;gap:12px;font-size:14px}.summary-row span:last-child{text-align:right;word-break:break-word;max-width:58%}
</style>
</head>
<body>
<header>
<h1>สรุปและชำระเงิน</h1>
<p class="sub">ตรวจสอบข้อมูลก่อนยืนยัน</p>
</header>

<div class="card">
<div class="section-title">สรุปรายการ</div>
<div class="summary-row"><span>ที่อยู่ผู้ส่ง</span><span id="sumSenderAddress">...</span></div>
<div class="summary-row"><span>ที่อยู่ผู้รับ</span><span id="sumReceiverAddress">...</span></div>
<div class="summary-row"><span>ประเภทพัสดุ</span><span id="sumParcelType">...</span></div>
<div class="summary-row"><span>น้ำหนัก</span><span id="sumParcelWeight">...</span></div>
<div class="summary-row"><span>ระยะทางประมาณ</span><span id="sumDistance">...</span></div>
</div>

<div class="card">
<div class="section-title">การชำระเงิน</div>
<label>เลือกวิธีการชำระเงิน</label>
<select id="paymentMethod">
<option value="cash">เงินสด</option>
<option value="transfer">โอน</option>
</select>
<label>ผู้ชำระเงิน</label>
<select id="payer">
<option value="sender">ผู้ส่ง</option>
<option value="receiver">ผู้รับ (เงินสดเท่านั้น)</option>
</select>
<label>รหัสโปรโมชัน</label>
<input id="promoCode" placeholder="ถ้ามี">
</div>

<div class="card">
<div class="section-title">สรุปราคา</div>
<div class="summary-row"><span>ค่าจัดส่ง</span><span id="sumPrice">คำนวณจากระบบ</span></div>
</div>

<div class="footer">
<div class="btn-row">
  <button id="backBtn" class="btn secondary" type="button">ย้อนกลับ</button>
  <button id="confirmBtn" class="btn" type="button">ยืนยันการสั่งส่ง</button>
</div>
</div>

<script>
const sumSenderAddress = document.getElementById('sumSenderAddress');
const sumReceiverAddress = document.getElementById('sumReceiverAddress');
const sumParcelType = document.getElementById('sumParcelType');
const sumParcelWeight = document.getElementById('sumParcelWeight');
const sumDistance = document.getElementById('sumDistance');
const sumPrice = document.getElementById('sumPrice');
const backBtn = document.getElementById('backBtn');
const confirmBtn = document.getElementById('confirmBtn');
const paymentMethodField = document.getElementById('paymentMethod');
const payerField = document.getElementById('payer');
const promoCodeField = document.getElementById('promoCode');

function escapeHtml(value){
  return String(value || '...')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function loadSummary(){
  let step1 = {};
  let step2 = {};
  let step3 = {};

  try{ step1 = JSON.parse(localStorage.getItem('parcel_step1') || '{}'); }catch(e){}
  try{ step2 = JSON.parse(localStorage.getItem('parcel_step2') || '{}'); }catch(e){}
  try{ step3 = JSON.parse(localStorage.getItem('parcel_step3') || '{}'); }catch(e){}

  sumSenderAddress.innerHTML = escapeHtml(step1.pickupAddress || step2.senderAddress);
  sumReceiverAddress.innerHTML = escapeHtml(step1.dropoffAddress || step2.receiverAddress);
  sumParcelType.innerHTML = escapeHtml(step2.parcelType);
  sumParcelWeight.innerHTML = escapeHtml(step2.parcelWeight);
  sumDistance.innerHTML = step1.distanceKm ? `${Number(step1.distanceKm).toFixed(1)} กม.` : '...';
  sumPrice.innerHTML = step1.priceEstimate ? `${Number(step1.priceEstimate).toLocaleString('th-TH')} บาท` : 'คำนวณจากระบบ';

  if(step3.payment_method) paymentMethodField.value = step3.payment_method;
  if(step3.payer) payerField.value = step3.payer;
  if(step3.promo_code) promoCodeField.value = step3.promo_code;
}

backBtn.addEventListener('click', () => {
  window.location.href = 'pacel2.html';
});

confirmBtn.addEventListener('click', () => {
  const payment_method = paymentMethodField.value;
  const payer = payerField.value;
  const promo_code = promoCodeField.value.trim();

  if(payment_method === 'transfer' && payer === 'receiver'){
    alert('ผู้รับชำระได้เฉพาะเงินสดเท่านั้น');
    return;
  }

  const step1 = JSON.parse(localStorage.getItem('parcel_step1') || '{}');
  const step2 = JSON.parse(localStorage.getItem('parcel_step2') || '{}');

  localStorage.setItem('parcel_step3', JSON.stringify({ payment_method, payer, promo_code }));

  localStorage.setItem('parcel_last_submission', JSON.stringify({
    service_type: 'parcel',
    pickup_address: step1.pickupAddress || step2.senderAddress || '',
    dropoff_address: step1.dropoffAddress || step2.receiverAddress || '',
    distance_km: step1.distanceKm || 0,
    delivery_fee: step1.priceEstimate || 0,
    sender_name: step2.senderName || '',
    sender_phone: step2.senderPhone || '',
    sender_note: step2.senderNote || '',
    receiver_name: step2.receiverName || '',
    receiver_phone: step2.receiverPhone || '',
    receiver_note: step2.receiverNote || '',
    parcel_type: step2.parcelType || '',
    parcel_weight: step2.parcelWeight || '',
    payment_method,
    payer,
    promo_code,
    submitted_at: new Date().toISOString(),
    created_from: 'parcel-prototype'
  }));

  alert('บันทึกคำสั่งส่งสำเร็จ');
  localStorage.removeItem('parcel_step1');
  localStorage.removeItem('parcel_step2');
  localStorage.removeItem('parcel_step3');
  window.location.href = 'index.html';
});

loadSummary();
</script>
</body>
</html>
