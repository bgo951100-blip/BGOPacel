<style>

body{margin:0;font-family:'Prompt',sans-serif;background:var(--bg);color:#111;padding-bottom:110px}

input,textarea{width:100%;padding:12px;margin-top:6px;border-radius:12px;border:1px solid #d1d5db;font-family:'Prompt',sans-serif}

.footer{margin:0 16px 24px;padding:0;background:transparent;border-top:0}
.btn-row{display:flex;gap:10px}
.btn{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;padding:14px;border-radius:14px;text-align:center;font-weight:500;border:none;width:100%;cursor:pointer;font-size:15px;font-family:'Prompt',sans-serif}
.btn.secondary{background:#eef2f7;color:#0b3c6d}
.btn:disabled{opacity:.6;cursor:not-allowed}
.summary-row{display:flex;justify-content:space-between;margin-top:6px;font-size:14px;gap:12px}
.summary-row span:last-child{text-align:right;word-break:break-word;max-width:58%}
.location-block{padding:14px;border:1px solid #e5e7eb;border-radius:16px;background:#fbfdff}.location-block + .location-block{margin-top:14px}
.map-preview{height:180px;margin-top:10px;border-radius:16px;border:2px solid transparent;background:#e5e7eb;overflow:hidden}
.map-preview.active-pickup{border-color:#0b3c6d}.map-preview.active-dropoff{border-color:#1e88e5}
.map-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;z-index:998;transition:opacity .2s ease}
.map-backdrop.show{opacity:1;pointer-events:auto}
.map-modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(calc(100vw - 24px),640px);display:none;z-index:999}
.map-modal.show{display:block}
.map-modal-card{position:relative;background:#fff;border-radius:24px;box-shadow:0 24px 60px rgba(15,23,42,.35);padding:12px}
.map-live{height:min(72dvh,520px);border-radius:18px;overflow:hidden;background:#e5e7eb}
.map-toolbar{position:absolute;top:24px;left:24px;right:24px;display:none;gap:8px;z-index:1000}
.map-toolbar.show{display:flex}
.map-toolbar input{flex:1;margin:0;background:#fff}
.map-hint{position:absolute;left:24px;right:24px;bottom:24px;display:none;z-index:1000}
.map-hint.show{display:block}
.map-hint .btn{width:100%;box-shadow:0 14px 30px rgba(30,136,229,.35)}
body.map-open{overflow:hidden}
@media (max-width:600px){body{padding-bottom:120px}input,textarea,.btn{font-size:16px}.map-preview{height:160px}.map-modal{width:calc(100vw - 18px)}.map-modal-card{border-radius:20px;padding:10px}.map-live{height:min(68dvh,420px);border-radius:16px}.map-toolbar{top:18px;left:18px;right:18px}.map-hint{left:18px;right:18px;bottom:18px}}
</style>

    <div class="summary-row"><span>&#x0E17;&#x0E35;&#x0E48;&#x0E2D;&#x0E22;&#x0E39;&#x0E48;&#x0E1C;&#x0E39;&#x0E49;&#x0E2A;&#x0E48;&#x0E07;</span><span id="pickupText">-</span></div>
    <label for="pickupNote">&#x0E2B;&#x0E21;&#x0E32;&#x0E22;&#x0E40;&#x0E2B;&#x0E15;&#x0E38;&#x0E17;&#x0E35;&#x0E48;&#x0E2D;&#x0E22;&#x0E39;&#x0E48;&#x0E08;&#x0E38;&#x0E14;&#x0E23;&#x0E31;&#x0E1A;</label>
    <textarea id="pickupNote" placeholder="&#x0E40;&#x0E0A;&#x0E48;&#x0E19; &#x0E1A;&#x0E49;&#x0E32;&#x0E19;&#x0E2B;&#x0E25;&#x0E31;&#x0E07;&#x0E21;&#x0E38;&#x0E21;&#x0E0B;&#x0E2D;&#x0E22;, &#x0E15;&#x0E23;&#x0E07;&#x0E02;&#x0E49;&#x0E32;&#x0E21;&#x0E23;&#x0E49;&#x0E32;&#x0E19;&#x0E22;&#x0E32;, &#x0E42;&#x0E17;&#x0E23;&#x0E01;&#x0E48;&#x0E2D;&#x0E19;&#x0E16;&#x0E36;&#x0E07;"></textarea>

    <button id="dropoffBtn" class="btn secondary" type="button">&#x0E04;&#x0E49;&#x0E19;&#x0E2B;&#x0E32;&#x0E15;&#x0E33;&#x0E41;&#x0E2B;&#x0E19;&#x0E48;&#x0E07;&#x0E1A;&#x0E19;&#x0E41;&#x0E1C;&#x0E19;&#x0E17;&#x0E35;&#x0E48;</button>
    <div class="summary-row"><span>&#x0E17;&#x0E35;&#x0E48;&#x0E2D;&#x0E22;&#x0E39;&#x0E48;&#x0E1C;&#x0E39;&#x0E49;&#x0E23;&#x0E31;&#x0E1A;</span><span id="dropoffText">-</span></div>
    <label for="dropoffNote">&#x0E2B;&#x0E21;&#x0E32;&#x0E22;&#x0E40;&#x0E2B;&#x0E15;&#x0E38;&#x0E17;&#x0E35;&#x0E48;&#x0E2D;&#x0E22;&#x0E39;&#x0E48;&#x0E08;&#x0E38;&#x0E14;&#x0E2A;&#x0E48;&#x0E07;</label>
    <textarea id="dropoffNote" placeholder="&#x0E40;&#x0E0A;&#x0E48;&#x0E19; &#x0E1D;&#x0E32;&#x0E01;&#x0E44;&#x0E27;&#x0E49;&#x0E01;&#x0E31;&#x0E1A; &#x0E23;&#x0E1B;&#x0E20;., &#x0E2B;&#x0E49;&#x0E2D;&#x0E07;&#x0E21;&#x0E38;&#x0E21;&#x0E0B;&#x0E49;&#x0E32;&#x0E22;, &#x0E42;&#x0E17;&#x0E23;&#x0E01;&#x0E48;&#x0E2D;&#x0E19;&#x0E40;&#x0E02;&#x0E49;&#x0E32;&#x0E2B;&#x0E21;&#x0E39;&#x0E48;&#x0E1A;&#x0E49;&#x0E32;&#x0E19;"></textarea>
  </div>
</div>

<div class="card">
  <div class="section-title">&#x0E41;&#x0E1C;&#x0E19;&#x0E17;&#x0E35;&#x0E48;</div>
  <div class="summary-row"><span>&#x0E2A;&#x0E16;&#x0E32;&#x0E19;&#x0E30;&#x0E01;&#x0E32;&#x0E23;&#x0E40;&#x0E25;&#x0E37;&#x0E2D;&#x0E01;</span><span id="activeHint">&#x0E41;&#x0E15;&#x0E30;&#x0E0A;&#x0E48;&#x0E2D;&#x0E07;&#x0E1C;&#x0E39;&#x0E49;&#x0E2A;&#x0E48;&#x0E07;&#x0E2B;&#x0E23;&#x0E37;&#x0E2D;&#x0E1C;&#x0E39;&#x0E49;&#x0E23;&#x0E31;&#x0E1A;&#x0E01;&#x0E48;&#x0E2D;&#x0E19;</span></div>
  <div class="map-preview" id="mapPreview"></div>
  <div class="summary-row"><span>&#x0E23;&#x0E30;&#x0E22;&#x0E30;&#x0E17;&#x0E32;&#x0E07;&#x0E1B;&#x0E23;&#x0E30;&#x0E21;&#x0E32;&#x0E13;</span><span id="distanceText">-</span></div>
  <div class="summary-row"><span>&#x0E23;&#x0E32;&#x0E04;&#x0E32;&#x0E1B;&#x0E23;&#x0E30;&#x0E21;&#x0E32;&#x0E13;</span><span id="priceText">-</span></div>
</div>

<div class="footer">

      <button id="closeMap" class="btn secondary" type="button">&#x0E1B;&#x0E34;&#x0E14;</button>

      <button id="confirmPoint" class="btn" type="button">&#x0E22;&#x0E37;&#x0E19;&#x0E22;&#x0E31;&#x0E19;&#x0E08;&#x0E38;&#x0E14;&#x0E19;&#x0E35;&#x0E49;</button>
    </div>
  </div>
</div>

<script>
const TH = {
  defaultPlace: '\u0E2B\u0E2D\u0E19\u0E32\u0E2C\u0E34\u0E01\u0E32\u0E40\u0E17\u0E28\u0E1A\u0E32\u0E25\u0E40\u0E21\u0E37\u0E2D\u0E07\u0E40\u0E1A\u0E15\u0E07',
  km: '\u0E01\u0E21.',
  baht: '\u0E1A\u0E32\u0E17',
  activePickup: '\u0E01\u0E33\u0E25\u0E31\u0E07\u0E40\u0E25\u0E37\u0E2D\u0E01\u0E08\u0E38\u0E14\u0E23\u0E31\u0E1A\u0E1E\u0E31\u0E2A\u0E14\u0E38',
  activeDropoff: '\u0E01\u0E33\u0E25\u0E31\u0E07\u0E40\u0E25\u0E37\u0E2D\u0E01\u0E08\u0E38\u0E14\u0E2A\u0E48\u0E07\u0E1E\u0E31\u0E2A\u0E14\u0E38',
  confirmPickup: '\u0E22\u0E37\u0E19\u0E22\u0E31\u0E19\u0E08\u0E38\u0E14\u0E23\u0E31\u0E1A\u0E1E\u0E31\u0E2A\u0E14\u0E38',
  confirmDropoff: '\u0E22\u0E37\u0E19\u0E22\u0E31\u0E19\u0E08\u0E38\u0E14\u0E2A\u0E48\u0E07\u0E1E\u0E31\u0E2A\u0E14\u0E38',
  notFound: '\u0E44\u0E21\u0E48\u0E1E\u0E1A\u0E17\u0E35\u0E48\u0E2D\u0E22\u0E39\u0E48'
};

const pickupBtn = document.getElementById('pickupBtn');
const dropoffBtn = document.getElementById('dropoffBtn');
const pickupText = document.getElementById('pickupText');
const dropoffText = document.getElementById('dropoffText');
const pickupSearchField = document.getElementById('pickupSearchField');
const dropoffSearchField = document.getElementById('dropoffSearchField');
const pickupNote = document.getElementById('pickupNote');
const dropoffNote = document.getElementById('dropoffNote');
const nextBtn = document.getElementById('nextBtn');
const distanceText = document.getElementById('distanceText');
const priceText = document.getElementById('priceText');
const activeHint = document.getElementById('activeHint');
const mapPreview = document.getElementById('mapPreview');
const mapBackdrop = document.getElementById('mapBackdrop');
const mapModal = document.getElementById('mapModal');
const mapToolbar = document.getElementById('mapToolbar');
const mapSearch = document.getElementById('mapSearch');
const closeMapBtn = document.getElementById('closeMap');
const mapHint = document.getElementById('mapHint');
const confirmPoint = document.getElementById('confirmPoint');
const mapEl = document.getElementById('map');

let map;
let previewMap;
let geocoder;
let pickupMarker;
let dropoffMarker;
let directionsService;
let directionsRenderer;
let activeField = 'pickup';
let distanceKm = null;
let priceEstimate = null;

const PRICE_BASE = 30;
const PRICE_PER_KM = 8;
const DEFAULT_CENTER = { lat: 5.77434, lng: 101.07231 };
const DEFAULT_PLACE = TH.defaultPlace;

function updateEstimate(){
  if(distanceKm === null){
    distanceText.textContent = '-';
    priceText.textContent = '-';
    return;
  }
  distanceText.textContent = `${distanceKm.toFixed(1)} ${TH.km}`;
  priceEstimate = Math.round(PRICE_BASE + (distanceKm * PRICE_PER_KM));
  priceText.textContent = `${priceEstimate.toLocaleString('th-TH')} ${TH.baht}`;
}

function updateStorage(){
  const payload = {
    pickupAddress: pickupText.textContent === '-' ? '' : pickupText.textContent,
    dropoffAddress: dropoffText.textContent === '-' ? '' : dropoffText.textContent,
    pickupNote: pickupNote.value.trim(),
    dropoffNote: dropoffNote.value.trim(),
    pickupLat: pickupMarker ? pickupMarker.getPosition().lat() : null,
    pickupLng: pickupMarker ? pickupMarker.getPosition().lng() : null,
    dropoffLat: dropoffMarker ? dropoffMarker.getPosition().lat() : null,
    dropoffLng: dropoffMarker ? dropoffMarker.getPosition().lng() : null,
    distanceKm,
    priceEstimate
  };
  localStorage.setItem('parcel_step1', JSON.stringify(payload));
}

function updatePreview(){
  if(!previewMap){
    return;
  }
  if(pickupMarker && dropoffMarker){
    const bounds = new google.maps.LatLngBounds();
    bounds.extend(pickupMarker.getPosition());
    bounds.extend(dropoffMarker.getPosition());
    previewMap.fitBounds(bounds, 40);
    return;
  }
  if(pickupMarker){
    previewMap.setCenter(pickupMarker.getPosition());
    previewMap.setZoom(15);
    return;
  }
  if(dropoffMarker){
    previewMap.setCenter(dropoffMarker.getPosition());
    previewMap.setZoom(15);
  }
}

function calcRoute(){
  if(!pickupMarker || !dropoffMarker){
    distanceKm = null;
    updateEstimate();
    updateStorage();
    updatePreview();
    return;
  }
  directionsService.route({
    origin: pickupMarker.getPosition(),
    destination: dropoffMarker.getPosition(),
    travelMode: google.maps.TravelMode.DRIVING
  }, (result, status) => {
    if(status !== 'OK' || !result.routes || !result.routes[0]){
      distanceKm = null;
      updateEstimate();
      updateStorage();
      updatePreview();
      return;
    }
    directionsRenderer.setDirections(result);
    const leg = result.routes[0].legs[0];
    distanceKm = leg.distance.value / 1000;
    updateEstimate();
    updateStorage();
    updatePreview();
  });
}

function setMarker(position, type){
  if(type === 'pickup'){
    if(!pickupMarker){
      pickupMarker = new google.maps.Marker({map, position, label:'A', draggable:true});
      pickupMarker.addListener('dragend', () => handleDraggedMarker('pickup'));
    } else {
      pickupMarker.setPosition(position);
    }
  } else {
    if(!dropoffMarker){
      dropoffMarker = new google.maps.Marker({map, position, label:'B', draggable:true});
      dropoffMarker.addListener('dragend', () => handleDraggedMarker('dropoff'));
    } else {
      dropoffMarker.setPosition(position);
    }
  }
  map.panTo(position);
  calcRoute();
}

function handleDraggedMarker(type){
  const marker = type === 'pickup' ? pickupMarker : dropoffMarker;
  if(!marker){
    return;
  }
  reverseGeocode(marker.getPosition(), (address) => {
    if(type === 'pickup'){
      pickupText.textContent = address;
      pickupSearchField.value = address;
    } else {
      dropoffText.textContent = address;
      dropoffSearchField.value = address;
    }
    syncButton();
    updateStorage();
    calcRoute();
  });
}

function setActiveField(type){
  activeField = type;
  mapPreview.classList.toggle('active-pickup', type === 'pickup');
  mapPreview.classList.toggle('active-dropoff', type === 'dropoff');
  activeHint.textContent = type === 'pickup' ? TH.activePickup : TH.activeDropoff;
  confirmPoint.textContent = type === 'pickup' ? TH.confirmPickup : TH.confirmDropoff;
}

function reverseGeocode(latLng, cb){
  geocoder.geocode({ location: latLng }, (results, status) => {
    if(status === 'OK' && results && results[0]){
      cb(results[0].formatted_address);
      return;
    }
    cb(TH.notFound);
  });
}

function bindAutocomplete(input, type){
  const autocomplete = new google.maps.places.Autocomplete(input);
  autocomplete.bindTo('bounds', map);
  autocomplete.addListener('place_changed', () => {
    const place = autocomplete.getPlace();
    if(!place.geometry){
      return;
    }
    setActiveField(type);
    setMarker(place.geometry.location, type);
    const address = place.formatted_address || input.value.trim();
    if(type === 'pickup'){
      pickupText.textContent = address;
      pickupSearchField.value = address;
    } else {
      dropoffText.textContent = address;
      dropoffSearchField.value = address;
    }
    syncButton();
    updateStorage();
    updatePreview();
  });
}

function syncButton(){
  const ok = pickupText.textContent.trim() !== '-' && dropoffText.textContent.trim() !== '-';
  nextBtn.disabled = !ok;
}

function openMap(type){
  setActiveField(type);
  document.body.classList.add('map-open');
  mapBackdrop.classList.add('show');
  mapModal.classList.add('show');
  mapToolbar.classList.add('show');
  mapHint.classList.add('show');
  mapSearch.value = type === 'pickup' ? pickupSearchField.value : dropoffSearchField.value;
  setTimeout(() => {
    google.maps.event.trigger(map, 'resize');
    if(type === 'pickup' && pickupMarker){
      map.setZoom(16);
      map.panTo(pickupMarker.getPosition());
    } else if(type === 'dropoff' && dropoffMarker){
      map.setZoom(16);
      map.panTo(dropoffMarker.getPosition());
    } else if(pickupMarker){
      map.setZoom(16);
      map.panTo(pickupMarker.getPosition());
    } else if(dropoffMarker){
      map.setZoom(16);
      map.panTo(dropoffMarker.getPosition());
    } else {
      map.setCenter(DEFAULT_CENTER);
      map.setZoom(13);
    }
  }, 80);
}

function closeMap(){
  document.body.classList.remove('map-open');
  mapBackdrop.classList.remove('show');
  mapModal.classList.remove('show');
  mapToolbar.classList.remove('show');
  mapHint.classList.remove('show');
}

window.initMap = function initMap(){
  previewMap = new google.maps.Map(mapPreview, {
    center: DEFAULT_CENTER,
    zoom: 13,
    disableDefaultUI: true,
    gestureHandling: 'none',
    keyboardShortcuts: false
  });

  map = new google.maps.Map(mapEl, {
    center: DEFAULT_CENTER,
    zoom: 13,
    disableDefaultUI: true,
    zoomControl: true
  });

  geocoder = new google.maps.Geocoder();
  directionsService = new google.maps.DirectionsService();
  directionsRenderer = new google.maps.DirectionsRenderer({ map, suppressMarkers: true, preserveViewport: true });

  const modalSearchAuto = new google.maps.places.Autocomplete(mapSearch);
  modalSearchAuto.bindTo('bounds', map);
  modalSearchAuto.addListener('place_changed', () => {
    const place = modalSearchAuto.getPlace();
    if(!place.geometry) return;
    const target = activeField || 'pickup';
    setMarker(place.geometry.location, target);
    const address = place.formatted_address || mapSearch.value.trim();
    if(target === 'pickup'){
      pickupText.textContent = address;
      pickupSearchField.value = address;
    } else {
      dropoffText.textContent = address;
      dropoffSearchField.value = address;
    }
    syncButton();
    updateStorage();
    updatePreview();
  });

  bindAutocomplete(pickupSearchField, 'pickup');
  bindAutocomplete(dropoffSearchField, 'dropoff');

  map.addListener('click', (e) => {
    const target = activeField || (!pickupMarker ? 'pickup' : 'dropoff');
    setMarker(e.latLng, target);
    reverseGeocode(e.latLng, (address) => {
      if(target === 'pickup'){
        pickupText.textContent = address;
        pickupSearchField.value = address;
      } else {
        dropoffText.textContent = address;
        dropoffSearchField.value = address;
      }
      syncButton();
      updateStorage();
      updatePreview();
    });
  });

  pickupNote.addEventListener('input', updateStorage);
  dropoffNote.addEventListener('input', updateStorage);

  try {
    const saved = JSON.parse(localStorage.getItem('parcel_step1') || '{}');
    if(saved.pickupAddress){
      pickupText.textContent = saved.pickupAddress;
      pickupSearchField.value = saved.pickupAddress;
    }
    if(saved.dropoffAddress){
      dropoffText.textContent = saved.dropoffAddress;
      dropoffSearchField.value = saved.dropoffAddress;
    }
    if(saved.pickupNote) pickupNote.value = saved.pickupNote;
    if(saved.dropoffNote) dropoffNote.value = saved.dropoffNote;
    if(saved.pickupLat && saved.pickupLng){
      setMarker(new google.maps.LatLng(saved.pickupLat, saved.pickupLng), 'pickup');
    }
    if(saved.dropoffLat && saved.dropoffLng){
      setMarker(new google.maps.LatLng(saved.dropoffLat, saved.dropoffLng), 'dropoff');
    }
  } catch (e) {}

  if((pickupText.textContent === '-' || !pickupText.textContent.trim()) && !pickupMarker && navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const loc = new google.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
        map.setCenter(loc);
        setActiveField('pickup');
        setMarker(loc, 'pickup');
        reverseGeocode(loc, (address) => {
          pickupText.textContent = address;
          pickupSearchField.value = address;
          updateStorage();
          syncButton();
          updatePreview();
        });
      },
      () => {
        geocoder.geocode({ address: DEFAULT_PLACE }, (results, status) => {
          if(status === 'OK' && results && results[0]){
            const loc = results[0].geometry.location;
            map.setCenter(loc);
            setActiveField('pickup');
            setMarker(loc, 'pickup');
            pickupText.textContent = results[0].formatted_address || pickupText.textContent;
            pickupSearchField.value = pickupText.textContent;
            updateStorage();
            syncButton();
            updatePreview();
          }
        });
      },
      { enableHighAccuracy: true, timeout: 8000, maximumAge: 60000 }
    );
  }

  if((dropoffText.textContent === '-' || !dropoffText.textContent.trim()) && !dropoffMarker){
    geocoder.geocode({ address: DEFAULT_PLACE }, (results, status) => {
      if(status === 'OK' && results && results[0]){
        const loc = results[0].geometry.location;
        setActiveField('dropoff');
        setMarker(loc, 'dropoff');
        dropoffText.textContent = results[0].formatted_address || dropoffText.textContent;
        dropoffSearchField.value = dropoffText.textContent;
        updateStorage();
        syncButton();
        updatePreview();
      }
    });
  }

  updatePreview();
  syncButton();
};

nextBtn.addEventListener('click', () => {
  const pickup = pickupText.textContent.trim();
  const dropoff = dropoffText.textContent.trim();
  if(!pickup || !dropoff || pickup === '-' || dropoff === '-'){
    syncButton();
    return;
  }
  updateStorage();
  window.location.href = 'pacel2.html';
});

pickupBtn.addEventListener('click', () => openMap('pickup'));
dropoffBtn.addEventListener('click', () => openMap('dropoff'));
pickupSearchField.addEventListener('focus', () => setActiveField('pickup'));
dropoffSearchField.addEventListener('focus', () => setActiveField('dropoff'));
mapBackdrop.addEventListener('click', closeMap);
closeMapBtn.addEventListener('click', closeMap);
confirmPoint.addEventListener('click', closeMap);
</script>
<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB4eIoOargBmLJWifYrlTcSklmi7IqtyA8&libraries=places&callback=initMap"></script>
